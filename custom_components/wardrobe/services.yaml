cycle_state:
  name: Cycle state
  description: >-
    Advance a wardrobe item to the next state in the cycle
    (clean → worn → laundry → clean).
  target:
    entity:
      integration: wardrobe
      domain: select

set_state:
  name: Set state
  description: Set a wardrobe item to a specific state.
  target:
    entity:
      integration: wardrobe
      domain: select
  fields:
    state:
      name: State
      description: Target state for the wardrobe item.
      required: true
      example: clean
      selector:
        select:
          options:
            - clean
            - worn
            - laundry
          translation_key: state

bulk_set_state:
  name: Bulk set state
  description: >-
    Set the state of every wardrobe item that matches the given filters.
    Filters are combined with AND; omitted filters are ignored.
  fields:
    new_state:
      name: New state
      description: Target state to apply to every matching item.
      required: true
      example: clean
      selector:
        select:
          options:
            - clean
            - worn
            - laundry
          translation_key: state
    category:
      name: Category filter
      description: Only affect items in this category.
      required: false
      selector:
        select:
          options:
            - shirt
            - t_shirt
            - pants
            - jeans
            - shorts
            - skirt
            - dress
            - jacket
            - coat
            - sweater
            - hoodie
            - shoes
            - socks
            - hat
            - scarf
            - other
          translation_key: category
    laundry_type:
      name: Laundry-type filter
      description: Only affect items of this laundry type.
      required: false
      selector:
        select:
          options:
            - dark
            - light
            - color
            - delicates
          translation_key: laundry_type
    current_state:
      name: Current-state filter
      description: Only affect items currently in this state.
      required: false
      selector:
        select:
          options:
            - clean
            - worn
            - laundry
          translation_key: state
